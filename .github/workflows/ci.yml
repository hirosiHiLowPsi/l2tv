name: L2TV CI

on:
  push:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Syntax and application tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check server.js
        run: node --check server.js

      - name: Check electron-main.js
        run: node --check electron-main.js

      - name: Check database-worker.js
        run: node --check database-worker.js

      - name: Check electron-preload.js
        run: node --check electron-preload.js

      - name: Check public/app.js
        run: node --check public/app.js

      - name: Check release scripts
        run: node --check scripts/build-win-zip.js && node --check scripts/apply-electron-fuses.js && node --check scripts/verify-electron-fuses.js && node --check scripts/verify-packaged-launch.js

      - name: Run test suite
        run: xvfb-run -a npm test
