name: L2TV CI

on:
  push:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Syntax and application tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check server.js
        run: node --check server.js

      - name: Check electron-main.js
        run: node --check electron-main.js

      - name: Check public/app.js
        run: node --check public/app.js

      - name: Run test suite
        run: npm test
